<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Gadget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      display: block;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      text-decoration: none;
      color: #333;
      transition: 0.15s ease;
    }

    .card:hover {
      border-color: #999;
      transform: translateY(-2px);
    }

    .title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

<h1>Gadget</h1>

<div class="grid">

  <a class="card" href="./calctemp/index.html">
    <div class="title">水溫計算器</div>
    <div class="desc">快速混水 / 溫度估算工具</div>
  </a>

</div>

</body>
</html>
